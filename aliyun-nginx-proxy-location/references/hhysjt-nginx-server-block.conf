# 阿里云 hhysjt.com server block 完整配置
# 更新时间: 2026-07-19
# 路径: /etc/nginx/conf.d/hhysjt.conf
#
# 注意：
# 1. 阿里云 Workbench 的 heredoc 经常失效，优先用 python3 -c 或单行 echo
# 2. 必须有 listen 443 ssl http2，否则 HTTPS 完全不可用
# 3. 所有 nginx 变量 ($host, $remote_addr 等) 在单引号中不会被 shell 展开
# 4. nginx -t 通过 不代表文件真的被写了！必须用 grep listen 443 做双重验证
#
# 单行写入命令（给用户复制到阿里云 Workbench）:
#   python3 -c "
#   open('/etc/nginx/conf.d/hhysjt.conf','w').write(r'''完整内容'''）
#   print('Written')
#   "

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hhysjt.com hhysjt.com;
    root /var/www/hhysjt;
    index index.html;
    charset utf-8;

    # 后台服务 (8088)
    location /v1/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK";
    }

    # 企业微信 (8645)
    location /wecom/ {
        proxy_pass http://127.0.0.1:8645;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # RAG 服务 (18790, via frp tunnel) — 各子路由
    location /report/ {
        proxy_pass http://127.0.0.1:18790/wechat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/ { proxy_pass http://127.0.0.1:18790; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; }
    location /lab-results/ { proxy_pass http://127.0.0.1:18790; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; }
    location /reports/ { proxy_pass http://127.0.0.1:18790; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; }
    location /patients/ { proxy_pass http://127.0.0.1:18790; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; }
    location /imaging-results/ { proxy_pass http://127.0.0.1:18790; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; }
    location /all-reports/ { proxy_pass http://127.0.0.1:18790; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; }

    # 指南共识查询 (长超时)
    location /guideline {
        proxy_pass http://127.0.0.1:18790;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # 临床辅助分析 (长超时，禁用缓存)
    location ~ ^/clinical(/.*)?$ {
        proxy_pass http://127.0.0.1:18790;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        add_header Cache-Control "no-cache" always;
    }

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/www.hhysjt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.hhysjt.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
